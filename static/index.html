<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>赛诺秀社媒运营助手</title>
<style>
  :root {
    --ink: #1c2b2d;
    --paper: #f6f4ef;
    --line: #d8d3c6;
    --accent: #b8754a;
    --accent-soft: #ead9ca;
    --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    --serif: 'Source Serif Pro', Georgia, serif;
    --sans: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--sans); background: var(--paper); color: var(--ink); height: 100vh; overflow: hidden; }
  .layout { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
  .sidebar { border-right: 1px solid var(--line); padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; background: #fbfaf6; overflow-y: auto; }
  .brand { font-family: var(--serif); font-size: 17px; font-weight: 600; letter-spacing: 0.02em; border-bottom: 2px solid var(--accent); padding-bottom: 10px; flex-shrink: 0; }
  .brand small { display: block; font-family: var(--sans); font-size: 10px; font-weight: 400; color: #8a8378; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 3px; }
  .kb-categories { display: flex; flex-direction: column; gap: 8px; }
  .kb-cat { border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: #fff; }
  .kb-cat-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; cursor: pointer; user-select: none; transition: background 0.15s; }
  .kb-cat-header:hover { background: var(--accent-soft); }
  .kb-cat-header .cat-left { display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .kb-cat-header .cat-icon { font-size: 14px; }
  .kb-cat-header .cat-count { font-size: 10px; background: var(--accent-soft); color: var(--accent); border-radius: 10px; padding: 1px 6px; font-weight: 600; }
  .kb-cat-header .chevron { font-size: 10px; color: #a39b8c; transition: transform 0.2s; }
  .kb-cat.open .chevron { transform: rotate(180deg); }
  .kb-cat-body { display: none; padding: 8px 10px; border-top: 1px solid var(--line); background: #fdfcf9; }
  .kb-cat.open .kb-cat-body { display: block; }
  .upload-btn-small { display: block; width: 100%; border: 1px dashed var(--line); border-radius: 4px; padding: 7px 10px; text-align: center; cursor: pointer; font-size: 11.5px; color: #8a8378; background: transparent; transition: border-color 0.15s, background 0.15s; margin-bottom: 8px; }
  .upload-btn-small:hover { border-color: var(--accent); background: var(--accent-soft); color: var(--ink); }
  .upload-btn-small input { display: none; }
  .upload-status-small { font-size: 11px; color: var(--accent); min-height: 14px; margin-bottom: 4px; }
  .doc-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
  .doc-item { display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; background: #fff; border: 1px solid var(--line); border-radius: 4px; padding: 5px 8px; gap: 6px; }
  .doc-item span.name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--mono); font-size: 10.5px; flex: 1; }
  .doc-item button { border: none; background: none; color: #b56a5a; cursor: pointer; font-size: 11px; flex-shrink: 0; padding: 0; }
  .doc-item button:hover { text-decoration: underline; }
  .meta-note { margin-top: auto; font-size: 10.5px; color: #a39b8c; line-height: 1.6; border-top: 1px solid var(--line); padding-top: 12px; flex-shrink: 0; }
  .main { display: flex; flex-direction: column; height: 100vh; }
  .chat-window { flex: 1; overflow-y: auto; padding: 28px 44px; display: flex; flex-direction: column; gap: 22px; }
  .msg { max-width: 720px; line-height: 1.75; font-size: 14.5px; }
  .msg.user { align-self: flex-end; background: var(--ink); color: var(--paper); padding: 10px 16px; border-radius: 10px 10px 2px 10px; }
  .msg.assistant { align-self: flex-start; padding: 4px 0; }
  .msg.assistant::before { content: '助手'; display: block; font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 6px; }
  .msg.assistant .sources { margin-top: 10px; font-size: 11px; color: #a39b8c; font-family: var(--mono); }
  .msg table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg th, .msg td { border: 1px solid var(--line); padding: 6px 10px; text-align: left; }
  .msg th { background: var(--accent-soft); }
  .empty-state { margin: auto; text-align: center; color: #a39b8c; max-width: 480px; }
  .empty-state h2 { font-family: var(--serif); font-size: 20px; color: var(--ink); margin-bottom: 8px; }
  .empty-state p { font-size: 13px; line-height: 1.7; }
  .loading-dots::after { content: '·'; animation: dots 1.2s steps(3, end) infinite; }
  @keyframes dots { 0%, 20% { content: '·'; } 40% { content: '··'; } 60%, 100% { content: '···'; } }
  .input-bar { border-top: 1px solid var(--line); padding: 14px 44px 20px; background: var(--paper); }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; resize: none; border: 1px solid var(--line); border-radius: 8px; padding: 11px 14px; font-size: 14px; font-family: var(--sans); background: #fff; color: var(--ink); min-height: 44px; max-height: 160px; line-height: 1.5; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn { background: var(--ink); color: var(--paper); border: none; border-radius: 8px; padding: 11px 20px; font-size: 14px; cursor: pointer; font-family: var(--sans); transition: background 0.15s; flex-shrink: 0; }
  .send-btn:hover { background: var(--accent); }
  .send-btn:disabled { background: var(--line); cursor: not-allowed; }
  .attach-btn { flex-shrink: 0; width: 44px; height: 44px; border: 1px solid var(--line); border-radius: 8px; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; transition: border-color 0.15s, background 0.15s; }
  .attach-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .attach-btn.has-file { border-color: var(--accent); background: var(--accent-soft); }
  .input-options { display: flex; align-items: center; gap: 10px; margin-top: 7px; font-size: 12px; color: #8a8378; flex-wrap: wrap; }
  .input-options label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .attached-name { font-family: var(--mono); color: var(--accent); font-size: 11px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--line); padding: 12px; flex-direction: row; flex-wrap: wrap; align-items: flex-start; gap: 8px; max-height: 50vh; overflow-y: auto; }
    .brand { flex: 1; border-bottom: none; padding-bottom: 0; font-size: 15px; }
    .brand small { display: none; }
    .kb-categories { flex-direction: column; width: 100%; }
    .meta-note { display: none; }
    .chat-window { padding: 16px; }
    .input-bar { padding: 10px 16px 14px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">赛诺秀社媒运营助手<small>Knowledge Base · Agent</small></div>
    <div class="kb-categories">

      <div class="kb-cat" id="cat-product">
        <div class="kb-cat-header" onclick="toggleCat('cat-product')">
          <div class="cat-left"><span class="cat-icon">📋</span><span>产品资料</span><span class="cat-count" id="count-product">0</span></div>
          <span class="chevron">▼</span>
        </div>
        <div class="kb-cat-body">
          <label class="upload-btn-small">+ 上传产品资料(PDF/Word/Excel/PPT)
            <input type="file" accept=".pdf,.docx,.xlsx,.xlsm,.pptx,.txt" multiple onchange="handleUpload(this,'product','status-product')" />
          </label>
          <div class="upload-status-small" id="status-product"></div>
          <ul class="doc-list" id="list-product"></ul>
        </div>
      </div>

      <div class="kb-cat" id="cat-2b">
        <div class="kb-cat-header" onclick="toggleCat('cat-2b')">
          <div class="cat-left"><span class="cat-icon">🏥</span><span>2B往期文章</span><span class="cat-count" id="count-2b">0</span></div>
          <span class="chevron">▼</span>
        </div>
        <div class="kb-cat-body">
          <label class="upload-btn-small">+ 上传2B文章(Word/PDF/Excel)
            <input type="file" accept=".pdf,.docx,.xlsx,.xlsm,.pptx,.txt" multiple onchange="handleUpload(this,'2b','status-2b')" />
          </label>
          <div class="upload-status-small" id="status-2b"></div>
          <ul class="doc-list" id="list-2b"></ul>
        </div>
      </div>

      <div class="kb-cat" id="cat-2c">
        <div class="kb-cat-header" onclick="toggleCat('cat-2c')">
          <div class="cat-left"><span class="cat-icon">✨</span><span>2C往期文章</span><span class="cat-count" id="count-2c">0</span></div>
          <span class="chevron">▼</span>
        </div>
        <div class="kb-cat-body">
          <label class="upload-btn-small">+ 上传2C文章(Word/PDF/Excel)
            <input type="file" accept=".pdf,.docx,.xlsx,.xlsm,.pptx,.txt" multiple onchange="handleUpload(this,'2c','status-2c')" />
          </label>
          <div class="upload-status-small" id="status-2c"></div>
          <ul class="doc-list" id="list-2c"></ul>
        </div>
      </div>

    </div>
    <div class="meta-note">上传资料后即可作为知识库引用。<br/>对话时模型会自动检索相关内容。</div>
  </aside>

  <main class="main">
    <div class="chat-window" id="chatWindow">
      <div class="empty-state" id="emptyState">
        <h2>开始一次对话</h2>
        <p>例如：「2C方向，结合当下热点给我3个选题」<br/>或「详细介绍一下TempSure的产品特点」</p>
      </div>
    </div>
    <div class="input-bar">
      <div class="input-row">
        <label class="attach-btn" id="attachBtn" title="附件上传到本次对话">📎
          <input type="file" id="attachInput" accept=".pdf,.docx,.xlsx,.xlsm,.pptx,.txt" style="display:none" />
        </label>
        <textarea id="messageInput" placeholder="输入你的需求…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
      <div class="input-options">
        <label><input type="checkbox" id="webSearchToggle" checked /> 联网搜索热点</label>
        <label><input type="checkbox" id="saveToKbToggle" /> 附件同时存入知识库</label>
        <span id="attachedFileName" class="attached-name"></span>
      </div>
    </div>
  </main>
</div>
<script>
const chatWindow = document.getElementById('chatWindow');
const emptyState = document.getElementById('emptyState');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const webSearchToggle = document.getElementById('webSearchToggle');
const attachBtn = document.getElementById('attachBtn');
const attachInput = document.getElementById('attachInput');
const attachedFileName = document.getElementById('attachedFileName');
const saveToKbToggle = document.getElementById('saveToKbToggle');

let history = [];
let pendingAttachment = null;
const CAT_PREFIX = { product: '[产品]', '2b': '[2B]', '2c': '[2C]' };

function toggleCat(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open');
  const body = el.querySelector('.kb-cat-body');
  body.style.display = isOpen ? 'none' : 'block';
}

function autoExpand() {
  // 默认全部收起，点击才展开
}
async function handleUpload(input, category, statusId) {
  const files = Array.from(input.files);
  if (files.length === 0) return;
  const password = prompt('请输入上传密码：');
  if (!password) { input.value = ''; return; }
  const statusEl = document.getElementById(statusId);
  const prefix = CAT_PREFIX[category];
  for (const file of files) {
    statusEl.textContent = '正在上传 ' + file.name + '...';
    const renamedFile = new File([file], prefix + file.name, { type: file.type });
    const formData = new FormData();
    formData.append('file', renamedFile);
    formData.append('password', password);
    try {
 let extractUrl = '/extract?save_to_kb=' + saveToKbToggle.checked;
if (saveToKbToggle.checked) {
  const pwd = prompt('存入知识库需要验证密码：');
  if (!pwd) { attachInput.value = ''; return; }
  extractUrl += '&password=' + encodeURIComponent(pwd);
}
const res = await fetch(extractUrl, {
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '上传失败');
      }
      const data = await res.json();
      statusEl.textContent = file.name + ' 已导入，共 ' + data.chunks_added + ' 段';
    } catch (e) {
      statusEl.textContent = file.name + ' 上传失败: ' + e.message;
    }
  }

async function loadDocuments() {
  try {
    const res = await fetch('/documents');
    const data = await res.json();
    const docs = data.documents || [];
    const groups = { product: [], '2b': [], '2c': [] };
    docs.forEach(function(name) {
      if (name.startsWith('[产品]')) groups.product.push(name);
      else if (name.startsWith('[2B]')) groups['2b'].push(name);
      else if (name.startsWith('[2C]')) groups['2c'].push(name);
      else groups.product.push(name);
    });
    Object.keys(groups).forEach(function(cat) {
      const files = groups[cat];
      const list = document.getElementById('list-' + cat);
      const count = document.getElementById('count-' + cat);
      if (!list) return;
      list.innerHTML = '';
      count.textContent = files.length;
      files.forEach(function(name) {
        const displayName = name.replace(/^\[产品\]|\[2B\]|\[2C\]/, '');
        const li = document.createElement('li');
        li.className = 'doc-item';
        const span = document.createElement('span');
        span.className = 'name';
        span.title = displayName;
        span.textContent = displayName;
        const btn = document.createElement('button');
        btn.textContent = '删除';
        btn.dataset.name = name;
        btn.addEventListener('click', async function() {
          await fetch('/documents/' + encodeURIComponent(name), { method: 'DELETE' });
          loadDocuments();
        });
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    });
    autoExpand();
  } catch (e) {
    console.error(e);
  }
}

function renderMarkdown(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/^### (.*$)/gim, '<h4>$1</h4>')
    .replace(/^## (.*$)/gim, '<h3>$1</h3>')
    .replace(/^# (.*$)/gim, '<h2>$1</h2>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.*$)/gim, '<li>$1</li>')
    .replace(/\n/g, '<br/>');
}

function addMessage(role, text, sources) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = renderMarkdown(text);
  if (sources && sources.length > 0) {
    const srcDiv = document.createElement('div');
    srcDiv.className = 'sources';
    const cleaned = [...new Set(sources)].map(function(s) {
      return s.replace(/^\[产品\]|\[2B\]|\[2C\]/, '');
    });
    srcDiv.textContent = '参考资料: ' + cleaned.join(', ');
    div.appendChild(srcDiv);
  }
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div;
}

messageInput.addEventListener('input', function() {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
});

messageInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text && !pendingAttachment) return;

  let displayText = text;
  let payloadText = text;

  if (pendingAttachment) {
    displayText = text + '\n\n📎 附件: ' + pendingAttachment.filename;
    payloadText = text + '\n\n# 附件内容（来自 ' + pendingAttachment.filename + '）\n' + pendingAttachment.text;
  }

  addMessage('user', displayText || '（仅上传附件）');
  history.push({ role: 'user', content: payloadText || '请分析这份附件内容' });
  messageInput.value = '';
  messageInput.style.height = 'auto';
  sendBtn.disabled = true;

  pendingAttachment = null;
  attachBtn.classList.remove('has-file');
  attachedFileName.textContent = '';

  const loadingDiv = addMessage('assistant', '<span class="loading-dots">思考中</span>');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: payloadText || '请分析这份附件内容',
        history: history.slice(0, -1),
        use_web_search: webSearchToggle.checked,
      }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '请求失败');
    }
    const data = await res.json();
    loadingDiv.innerHTML = renderMarkdown(data.reply);
    if (data.kb_sources && data.kb_sources.length > 0) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      const cleaned = [...new Set(data.kb_sources)].map(function(s) {
        return s.replace(/^\[产品\]|\[2B\]|\[2C\]/, '');
      });
      srcDiv.textContent = '参考资料: ' + cleaned.join(', ');
      loadingDiv.appendChild(srcDiv);
    }
    history.push({ role: 'assistant', content: data.reply });
  } catch (e) {
    loadingDiv.innerHTML = '<span style="color:#b56a5a;">出错了: ' + e.message + '</span>';
  } finally {
    sendBtn.disabled = false;
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }
}

attachInput.addEventListener('change', async function() {
  const file = attachInput.files[0];
  if (!file) return;
  attachedFileName.textContent = '正在解析 ' + file.name + '...';
  const formData = new FormData();
  formData.append('file', file);
  try {
    const res = await fetch('/extract?save_to_kb=' + saveToKbToggle.checked, {
      method: 'POST',
      body: formData,
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '解析失败');
    }
    const data = await res.json();
    pendingAttachment = data;
    attachBtn.classList.add('has-file');
    attachedFileName.textContent = '已附加: ' + file.name + (data.truncated ? '（已截断）' : '');
    if (saveToKbToggle.checked && data.kb_result && !data.kb_result.error) {
      attachedFileName.textContent += '，已存入知识库';
      loadDocuments();
    }
  } catch (e) {
    attachedFileName.textContent = '解析失败: ' + e.message;
    pendingAttachment = null;
  }
  attachInput.value = '';
});

loadDocuments();
</script>
</body>
</html>
